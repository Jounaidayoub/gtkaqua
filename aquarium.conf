# GTK Aquarium Configuration
# Edit this file to tune the simulation, add/remove species, or change behavior.
# Lines starting with # are comments.
#
# After editing, restart the aquarium for changes to take effect.
# If you see an error on launch, check the terminal output.

[global]
eat_radius = 10.0
adrenaline_boost = 2.5
rotation_smooth = 0.1
death_flash_duration = 0.22
starvation_seconds = 120.0
start_width = 1280
start_height = 720
start_fullscreen = false
tick_ms = 16
assets_dir = "assets/"

# --- Species --------------------------------------------------------------
# Each entry under [[species]] defines one type of fish.
# To remove a fish, delete (or comment out) its entire [[species]] block.
# To add a new fish, copy an existing block, change the id, name, sprite path,
# and tune the values below.
#
# prey = [ "id1", "id2", ... ]   ← list of species this fish hunts (by id)
# is_apex = true/false           ← apex predators show a special label in the UI

[[species]]
id = "goldfish"
name = "Goldfish-ds"
sprite = "assets/goldfish.png"
sprite_width = 46
sprite_height = 23
mouth_forward_ratio = 0.40
max_speed = 85.0
min_speed = 30.0
max_force = 42.0
separation_radius = 24.0
alignment_radius = 120.0
cohesion_radius = 100.0
separation_weight = 1.6
alignment_weight = 1.35
cohesion_weight = 1.45
fear_radius = 190.0
fear_weight = 2.5
hunt_radius = 0.0
hunt_weight = 0.0
avoid_same_radius = 0.0
avoid_same_weight = 0.0
prey = []
lifespan = 120.0
flock_size = 45
max_population = 60
respawn_delay = 1.5
is_apex = false



